<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effort & Emotional Priming</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
            padding: 40px 50px;
        }

        .container { width: 700px; }

        .title {
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 40px;
        }

        .chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 250px;
            gap: 80px;
            margin-bottom: 16px;
            padding: 0 80px;
        }

        .bar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 120px;
        }

        .bar-value {
            font-size: 20px;
            font-weight: 700;
            color: #0d9488;
            margin-bottom: 12px;
        }

        .bar {
            width: 90px;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.15);
        }

        .bar-low {
            height: 133px; /* 0.32/0.60 * 250 */
            background: linear-gradient(180deg, #99f6e4 0%, #5eead4 100%);
        }

        .bar-high {
            height: 171px; /* 0.41/0.60 * 250 */
            background: linear-gradient(180deg, #2dd4bf 0%, #14b8a6 100%);
        }

        .bar-max {
            height: 183px; /* 0.44/0.60 * 250 */
            background: linear-gradient(180deg, #14b8a6 0%, #0d9488 100%);
        }

        .labels {
            display: flex;
            justify-content: center;
            gap: 80px;
            padding: 0 80px;
        }

        .label {
            width: 120px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-top: 16px;
        }

        .footnote {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 32px;
            padding-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">More thinking amplifies emotional priming</div>
        <div class="subtitle">Effect size (Cohen's d) for lines of code, paranoid vs neutral</div>

        <div class="chart">
            <div class="bar-group">
                <div class="bar-value">0.32</div>
                <div class="bar bar-low"></div>
            </div>
            <div class="bar-group">
                <div class="bar-value">0.41</div>
                <div class="bar bar-high"></div>
            </div>
            <div class="bar-group">
                <div class="bar-value">0.44</div>
                <div class="bar bar-max"></div>
            </div>
        </div>

        <div class="labels">
            <div class="label">Low</div>
            <div class="label">High</div>
            <div class="label">Max</div>
        </div>

        <div style="text-align: center; font-size: 13px; color: #6b7280; margin-top: 8px;">Effort level</div>

        <div class="footnote">Collapsed across all 3 models, n=90 per effort level</div>
    </div>
</body>
</html>
