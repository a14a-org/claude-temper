<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input validation rate by prompt type</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        .chart {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 32px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .label {
            min-width: 100px;
            font-size: 15px;
            font-weight: 500;
            color: #374151;
            text-align: right;
        }

        .bar-container {
            flex: 1;
            height: 48px;
            background: #f9fafb;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .bar {
            height: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
        }

        .bar.emotional {
            width: 75%;
            background: #DC2626;
        }

        .bar.instruction {
            width: 49%;
            background: #6B7280;
        }

        .bar.neutral {
            width: 20%;
            background: #D1D5DB;
            color: #4b5563;
        }

        .percentage {
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .footnotes {
            border-top: 1px solid #e5e7eb;
            padding-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footnote {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.5;
            letter-spacing: -0.2px;
        }

        .footnote strong {
            color: #4b5563;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Input validation rate by prompt type</div>

        <div class="chart">
            <div class="bar-row">
                <div class="label">Emotional</div>
                <div class="bar-container">
                    <div class="bar emotional">
                        <span class="percentage">75%</span>
                    </div>
                </div>
            </div>

            <div class="bar-row">
                <div class="label">Instruction</div>
                <div class="bar-container">
                    <div class="bar instruction">
                        <span class="percentage">49%</span>
                    </div>
                </div>
            </div>

            <div class="bar-row">
                <div class="label">Neutral</div>
                <div class="bar-container">
                    <div class="bar neutral">
                        <span class="percentage">20%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footnotes">
            <div class="footnote">
                <strong>n=75</strong> per condition, 5 coding tasks, <strong>p&lt;.001</strong>
            </div>
            <div class="footnote">
                The emotional prime never mentions 'validation' or 'security'
            </div>
        </div>
    </div>
</body>
</html>
